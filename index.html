<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FIDÉ CASINO - ULTIMATE AUDIO FIX</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', Arial; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid #333; align-items: center; }
        .stat-box { font-size: 18px; font-weight: bold; }
        .btn-deposit { background: #2ecc71; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }

        #main-container { display: flex; flex: 1; overflow: hidden; }
        #track-container { flex: 3; position: relative; background: #1e272e; border-right: 20px dashed #ff4757; margin: 10px; border-radius: 8px; overflow-x: hidden; }
        .lane { height: 45px; border-bottom: 1px solid #2c3e50; position: relative; display: flex; align-items: center; }
        .lane-num { margin-left: 10px; color: #555; font-weight: bold; width: 60px; z-index: 1; font-size: 11px; }
        
        .duck-wrapper { position: absolute; left: 0; display: flex; flex-direction: column; align-items: center; transition: left 0.4s linear; z-index: 5; width: 80px; }
        .duck-img { width: 45px; height: auto; transform: scaleX(-1); }
        .duck-label { font-size: 10px; color: #00ffff; font-weight: bold; background: rgba(0,0,0,0.8); padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
        
        #side-container { flex: 1; background: #111; display: flex; flex-direction: column; border: 1px solid #333; margin: 10px 10px 10px 0; border-radius: 8px; overflow: hidden; }
        #chat-messages { flex: 2; overflow-y: auto; padding: 10px; font-size: 13px; color: #00ff00; border-bottom: 1px solid #333; }
        #history-box { flex: 1; background: #000; padding: 10px; overflow-y: auto; }

        #controls { background: #1a1a1a; padding: 15px; text-align: center; border-top: 2px solid #333; }
        button { padding: 10px 15px; margin: 5px; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; }
        
        #winner-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 5px solid gold; padding: 40px; border-radius: 20px; text-align: center; z-index: 999; display: none; }
        
        /* Nút Loa Mới */
        #audio-panel { position: fixed; bottom: 100px; right: 20px; z-index: 1000; background: #222; padding: 10px; border-radius: 10px; border: 1px solid #444; text-align: center; }
        #mute-btn { background: #ff4757; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 20px; margin-bottom: 5px; }
    </style>
</head>
<body onclick="initAudio()">

<div id="audio-panel">
    <button id="mute-btn" onclick="toggleAudio()">🔇</button><br>
    <small id="audio-status">Nhấn để nghe</small>
</div>

<div id="winner-overlay">
    <div style="font-size: 24px; color:white; margin-bottom: 10px;">🎊 CHIẾN THẮNG 🎊</div>
    <div id="winner-name" style="color: gold; font-size: 50px; font-weight: bold;">...</div>
</div>

<div id="header">
    <div class="stat-box" style="color: #f1c40f;">💰 VỐN: $<span id="bal-val">5000</span></div>
    <button class="btn-deposit" onclick="deposit()">➕ NẠP</button>
    <div id="timer-display" class="stat-box" style="color: #00ff00;">⏳ ĐỒNG BỘ...</div>
    <div class="stat-box" style="color: #ff4757;">🔥 CƯỢC: $<span id="my-bet-val">0</span></div>
</div>

<div id="main-container">
    <div id="track-container">
        <script>
            const duckNames = ["Trà Từ Tay", "Thằng Canh Mộ", "Dùng Thanh Nộ", "Chày Từ Ta", "Mộ Xum Xuê", "Tôn Ngộ Đu", "Trừ Ta", "Shisha Ngộ Tĩnh", "Chú Ngộ Đo", "Đường Lên Phộ", "Tày Du Ký", "Ngô Như Đụ"];
            for(let i=1; i<=12; i++){
                document.write(`<div class="lane"><span class="lane-num">LÀN ${i}</span><div id="wrapper${i}" class="duck-wrapper"><span class="duck-label">${duckNames[i-1]}</span><img class="duck-img" src="vintage-racing.gif"></div></div>`);
            }
        </script>
    </div>
    <div id="side-container">
        <div id="chat-messages"></div>
        <div style="padding:5px;"><input type="text" id="chat-input" placeholder="Chat..." onkeypress="if(event.key==='Enter') sendMsg()" style="width:90%; background:#000; color:#fff; border:1px solid #444; padding:5px;"></div>
        <div id="history-box"><div id="history-list"></div></div>
    </div>
</div>

<div id="controls">
    VỊT: <input type="number" id="duck-select" value="1" min="1" max="12" style="width:40px;">
    <button style="background:#f1c40f" onclick="bet(1000)">+1k</button>
    <button style="background:#f1c40f" onclick="bet(5000)">+5k</button>
    <button style="background:#ff4757; color:white;" onclick="bet(parseInt(document.getElementById('bal-val').innerText))">ALL-IN</button>
</div>

<audio id="race-audio" loop preload="auto">
    <source src="./background_music.mp3" type="audio/mpeg">
</audio>

<script>
    const DB = "https://duck-rascist-default-rtdb.asia-southeast1.firebasedatabase.app/.json";
    let bal = 5000, myBet = 0, isBetting = true, positions = new Array(12).fill(0);
    const pName = "User_" + Math.floor(Math.random() * 999);
    const isHost = (window.location.hash === "#host");
    const audio = document.getElementById('race-audio');

    // HÀM KHỞI TẠO ÂM THANH (QUAN TRỌNG)
    function initAudio() {
        if (audio.paused) {
            audio.play().then(() => {
                updateUI(true);
            }).catch(e => console.log("Chờ tương tác..."));
        }
    }

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            updateUI(true);
        } else {
            audio.pause();
            updateUI(false);
        }
    }

    function updateUI(isPlaying) {
        const btn = document.getElementById('mute-btn');
        const txt = document.getElementById('audio-status');
        if(isPlaying) {
            btn.innerText = "🔊";
            btn.style.background = "#2ecc71";
            txt.innerText = "Đang phát";
        } else {
            btn.innerText = "🔇";
            btn.style.background = "#ff4757";
            txt.innerText = "Đã tắt";
        }
    }

    // ĐỒNG BỘ DỮ LIỆU TỪ FIREBASE
    setInterval(async () => {
        try {
            const r = await fetch(DB);
            const data = await r.json();
            if(!data) return;

            const st = parseInt(data.timer);
            document.getElementById('timer-display').innerText = st > 0 ? "⏳ ĐỢI: " + st + "s" : "🚀 ĐANG ĐUA!";
            isBetting = st > 0;

            if(data.race_pos) {
                data.race_pos.forEach((pos, i) => {
                    document.getElementById('wrapper' + (i+1)).style.left = pos + "px";
                });
            }

            const overlay = document.getElementById('winner-overlay');
            if(data.winner_name && data.winner_name !== "none") {
                document.getElementById('winner-name').innerText = data.winner_name;
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }

            if(data.history) {
                const h = Array.isArray(data.history) ? data.history : Object.values(data.history);
                document.getElementById('history-list').innerHTML = "📜 LỊCH SỬ:<br>" + h.slice().reverse().map(name => `<div style="font-size:12px; border-bottom:1px solid #222;">- ${name}</div>`).join('');
            }

            if(data.messages) {
                const ms = Array.isArray(data.messages) ? data.messages : Object.values(data.messages);
                document.getElementById('chat-messages').innerHTML = ms.map(m => `<div><b>${m.u || 'S'}:</b> ${m.t || m}</div>`).join('');
            }
        } catch(e) {}
    }, 450);

    // LOGIC MÁY CHỦ (HOST)
    if(isHost) {
        let serverTimer = 30;
        let wf = "none";
        setInterval(async () => {
            if(serverTimer > 0) {
                serverTimer--; wf = "none";
                await fetch(DB, { method: 'PATCH', body: JSON.stringify({ timer: serverTimer, race_pos: new Array(12).fill(0), winner_name: "none" }) });
            } else {
                let winIdx = -1;
                positions = positions.map((p, i) => {
                    let move = Math.random() * 45 + 15;
                    let newP = p + move;
                    if(newP > 950 && winIdx === -1) winIdx = i;
                    return newP;
                });
                if(winIdx !== -1 && wf === "none") {
                    wf = duckNames[winIdx];
                    const r = await fetch(DB);
                    const d = await r.json();
                    let ch = d.history && Array.isArray(d.history) ? d.history : [];
                    ch.push(wf); if(ch.length > 5) ch.shift();
                    await fetch(DB, { method: 'PATCH', body: JSON.stringify({ race_pos: positions, winner_name: wf, history: ch }) });
                    setTimeout(async () => {
                        serverTimer = 30;
                        await fetch(DB, { method: 'PATCH', body: JSON.stringify({ total_bet: 0, timer: 30, winner_name: "none" }) });
                    }, 6000);
                } else if(wf === "none") {
                    await fetch(DB, { method: 'PATCH', body: JSON.stringify({ race_pos: positions, timer: 0 }) });
                }
            }
        }, 400);
    }

    function deposit() { initAudio(); bal += 5000; document.getElementById('bal-val').innerText = bal; }
    
    async function bet(amt) {
        initAudio();
        if(!isBetting || bal < amt) return;
        bal -= amt; document.getElementById('bal-val').innerText = bal;
        document.getElementById('my-bet-val').innerText = (myBet += amt);
        const r = await fetch(DB);
        const d = await r.json();
        await fetch(DB, { method: 'PATCH', body: JSON.stringify({ total_bet: (d.total_bet || 0) + amt }) });
        sendMsg("cược $" + amt + " vịt " + document.getElementById('duck-select').value);
    }

    async function sendMsg(txt = null) {
        const v = txt || document.getElementById('chat-input').value; if(!v) return;
        const r = await fetch(DB); const d = await r.json();
        let ms = d.messages && Array.isArray(d.messages) ? d.messages : [];
        ms.push({ u: pName, t: v }); if(ms.length > 10) ms.shift();
        await fetch(DB, { method: 'PATCH', body: JSON.stringify({ messages: ms }) });
        document.getElementById('chat-input').value = "";
    }
</script>
</body>
</html>
