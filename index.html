<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FIDÉ DUCK RACE - ONLINE</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', Arial; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; }
        .stat-box { font-size: 20px; font-weight: bold; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #track-container { flex: 3; position: relative; background: #1e272e; border-right: 20px dashed #ff4757; margin: 10px; overflow-y: auto; border-radius: 5px; }
        .lane { height: 45px; border-bottom: 1px solid #2c3e50; position: relative; display: flex; align-items: center; }
        
        /* ĐÃ SỬA: Lật ngược vịt quay sang phải */
        .duck { 
            position: absolute; 
            left: 0; 
            width: 55px; 
            height: 35px; 
            z-index: 2; 
            transition: left 0.1s linear; 
            transform: scaleX(-1); /* Lật ngang ảnh */
        }
        
        .lane-num { margin-left: 10px; font-weight: bold; color: #444; font-size: 18px; }
        #chat-container { flex: 1; background: #111; display: flex; flex-direction: column; border: 1px solid #333; margin: 10px 10px 10px 0; border-radius: 8px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .msg { margin-bottom: 8px; padding: 5px; border-radius: 4px; background: #1a1a1a; border-bottom: 1px solid #222; }
        .msg-user { color: #00ff00; font-weight: bold; }
        .msg-bet { color: #ff9f43; font-style: italic; }
        #chat-input-area { padding: 10px; display: flex; gap: 5px; background: #1a1a1a; }
        #chat-input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #000; color: white; }
        #controls { background: #1a1a1a; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 15px; border-top: 2px solid #333; }
        button { padding: 10px 20px; font-size: 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-bet { background: #f1c40f; color: #000; }
        .btn-allin { background: #ff4757; color: white; }
        #total-bet-display { position: absolute; top: 10px; right: 20px; font-size: 22px; color: #00ffff; font-weight: bold; z-index: 10; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="header">
    <div class="stat-box" style="color: #f1c40f;">💰 VỐN: $<span id="balance">5000</span></div>
    <div id="timer" class="stat-box" style="color: #00ff00;">⏳ ĐỢI CƯỢC: 60s</div>
    <div class="stat-box" style="color: #ff4757;">🔥 CƯỢC: $<span id="my-bet">0</span></div>
</div>

<div id="main-container">
    <div id="track-container">
        <div id="total-bet-display">🏦 TỔNG CƯỢC: $0</div>
        <script>
            for(let i=1; i<=12; i++){
                document.write(`<div class="lane"><span class="lane-num">${i}</span><img id="duck${i}" class="duck" src="vintage-racing.gif"></div>`);
            }
        </script>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background: #54a0ff; color: white; border-radius: 4px;">Gửi</button>
        </div>
    </div>
</div>

<div id="controls">
    <label>VỊT SỐ:</label>
    <input type="number" id="selected-duck" value="1" min="1" max="12" style="width: 50px; padding: 8px;">
    <button class="btn-bet" onclick="addBet(1000)">+ $1000</button>
    <button class="btn-bet" onclick="addBet(5000)">+ $5000</button>
    <button class="btn-allin" onclick="allIn()">ALL-IN</button>
</div>

<audio id="bg-music" loop>
    <source src="background_music.mp3" type="audio/mpeg">
</audio>

<script>
    //: Link có HTTPS và /.json chuẩn
    const DB_URL = "https://duavitfide-default-rtdb.firebaseio.com/.json"; 
    
    const playerName = "User_" + Math.floor(Math.random() * 999);
    let balance = 5000;
    let myBet = 0;
    let timer = 60;
    let bettingPhase = true;
    const bgMusic = document.getElementById('bg-music');

    // Tự động đồng bộ mỗi 1.5 giây
    setInterval(async () => {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data) {
                document.getElementById('total-bet-display').innerText = `🏦 TỔNG CƯỢC: $${data.total_bet || 0}`;
                if (data.messages) {
                    const chatBox = document.getElementById('chat-messages');
                    const msgs = Object.values(data.messages);
                    chatBox.innerHTML = msgs.map(m => `<div class="msg"><span class="msg-user">${m.user}:</span> <span class="${m.type==='bet'?'msg-bet':''}">${m.text}</span></div>`).join('');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }
        } catch (e) { console.log("Lỗi kết nối:", e); }
    }, 1500);

    async function sendMessage(text = null, type = 'text') {
        const input = document.getElementById('chat-input');
        const message = text || input.value;
        if (!message) return;

        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            let messages = data.messages ? Object.values(data.messages) : [];
            messages.push({ user: playerName, text: message, type: type });
            if(messages.length > 20) messages.shift();
            await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify({ messages: messages }) });
            input.value = "";
        } catch (e) {}
    }

    async function addBet(amt) {
        if (!bettingPhase || balance < amt) return;
        balance -= amt;
        myBet += amt;
        document.getElementById('balance').innerText = balance;
        document.getElementById('my-bet').innerText = myBet;
        bgMusic.play().catch(() => {});

        const res = await fetch(DB_URL);
        const data = await res.json();
        const newTotal = (data.total_bet || 0) + amt;
        await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify({ total_bet: newTotal }) });
        sendMessage(`cược $${amt} vào Vịt ${document.getElementById('selected-duck').value}`, 'bet');
    }

    function allIn() { addBet(balance); }

    let timerInterval = setInterval(() => {
        timer--;
        if (timer > 0) {
            document.getElementById('timer').innerText = `⏳ ĐỢI CƯỢC: ${timer}s`;
        } else {
            clearInterval(timerInterval);
            startRace();
        }
    }, 1000);

    function startRace() {
        bettingPhase = false;
        document.getElementById('timer').innerText = `🚀 ĐANG ĐUA!`;
        let positions = new Array(12).fill(0);
        let raceInterval = setInterval(() => {
            for (let i = 0; i < 12; i++) {
                positions[i] += Math.random() * 8;
                document.getElementById(`duck${i+1}`).style.left = positions[i] + 'px';
                if (positions[i] >= document.getElementById('track-container').offsetWidth - 60) {
                    clearInterval(raceInterval);
                    finish(i + 1);
                    break;
                }
            }
        }, 50);
    }

    async function finish(winNum) {
        bgMusic.pause();
        alert(`Vịt số ${winNum} về nhất!`);
        await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify({ total_bet: 0 }) });
        location.reload();
    }
</script>
</body>
</html>
